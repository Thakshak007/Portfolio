<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Job Board | Search Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Automated Job Search Engine</h1>
            <p>Sourcing and filtering live roles matching your preferences</p>
        </div>
    </header>

    <main class="container">
        <section id="controls">
            <button onclick="loadJobs()">🔍 Refresh Live Job Feed</button>
        </section>

        <section id="results-section">
            <div id="loading" class="hidden">Searching Engineering Feeds... Please wait...</div>
            <div id="job-feed-list">
                </div>
        </section>
    </main>

    <script>
        async function loadJobs() {
            const feedList = document.getElementById('job-feed-list');
            const loading = document.getElementById('loading');
            
            feedList.innerHTML = '';
            loading.classList.remove('hidden');

            try {
                // Fetch data from your backend function
                const response = await fetch('/api/fetch-jobs');
                
                if (!response.ok) {
                    throw new Error(`Server returned status code: ${response.status}`);
                }

                const jobs = await response.json();
                loading.classList.add('hidden');

                // Safety Check: If the server response isn't an array, force it into one
                const jobArray = Array.isArray(jobs) ? jobs : [];

                if (jobArray.length === 0) {
                    feedList.innerHTML = '<p style="text-align:center; color:#94a3b8;">No matching semiconductor or core roles found today. Click refresh to retry.</p>';
                    return;
                }

                // Render the cards cleanly on screen
                jobArray.forEach(job => {
                    const card = document.createElement('div');
                    card.className = 'job-card';
                    
                    // Fallback selectors to prevent empty text fields
                    const title = job.title || "Engineering Position";
                    const company = job.company || "Technology Partner";
                    const location = job.location || "Bengaluru, India";
                    const source = job.source || "Industry Network";
                    const url = job.link || "#";
                    const desc = job.description || "Click apply to view core tracking specifications and profile demands.";

                    card.innerHTML = `
                        <h3>${title}</h3>
                        <p class="company">🏢 ${company} | 📍 ${location}</p>
                        <p style="font-size: 0.9rem; color: #cbd5e1; margin: 10px 0;">${desc}</p>
                        <p class="source-tag">Source: <strong>${source}</strong></p>
                        <a href="${url}" target="_blank" class="apply-btn">Apply For Role</a>
                    `;
                    feedList.appendChild(card);
                });
            } catch (error) {
                loading.classList.add('hidden');
                feedList.innerHTML = '<p style="text-align:center; color:#ef4444; font-weight:bold;">⚠️ Connection active, but parsing feed failed. Click Refresh to reload the pipeline.</p>';
                console.error("Frontend decoding exception:", error);
            }
        }
        
        // Auto-execute the pipeline immediately on load
        window.onload = loadJobs;
    </script>
</body>
</html>
